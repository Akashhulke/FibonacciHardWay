apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: postgres

  template:
    metadata:
      labels:
        component: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:14-alpine

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_PASSWORD
              value: postgrespassword

            - name: POSTGRES_USER
              value: postgres

            - name: POSTGRES_DB
              value: fibvalues
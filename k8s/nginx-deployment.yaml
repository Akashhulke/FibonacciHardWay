apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: nginx

  template:
    metadata:
      labels:
        component: nginx

    spec:
      containers:
        - name: nginx
          image: akashhulke/nginx:2ef9ad6d14e84adf977c3029f2fb9b5fe68fdd6c

          ports:
            - containerPort: 80
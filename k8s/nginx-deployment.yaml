apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: nginx

  template:
    metadata:
      labels:
        component: nginx

    spec:
      containers:
        - name: nginx
          image: akashhulke/nginx:c2a1b99d256586e629b5a48b37028802f3571e49

          ports:
            - containerPort: 80
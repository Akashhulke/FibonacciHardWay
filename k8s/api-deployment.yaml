apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: api

  template:
    metadata:
      labels:
        component: api

    spec:
      containers:
        - name: api
          image: akashhulke/api:96f19d251f6b79e6430fa8ca3dbdc8a0bae9ff5e

          ports:
            - containerPort: 5000
          env:
           - name: PGHOST
             value: postgres-service

           - name: PGUSER
             value: postgres

           - name: PGDATABASE
             value: fibvalues

           - name: PGPASSWORD
             value: postgrespassword

           - name: PGPORT
             value: "5432"

           - name: REDIS_HOST
             value: redis-service

           - name: REDIS_PORT
             value: "6379"
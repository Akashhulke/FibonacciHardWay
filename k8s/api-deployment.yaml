apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: api

  template:
    metadata:
      labels:
        component: api

    spec:
      containers:
        - name: api
          image: akashhulke/api:2ef9ad6d14e84adf977c3029f2fb9b5fe68fdd6c

          ports:
            - containerPort: 5000
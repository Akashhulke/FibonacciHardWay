apiVersion: apps/v1
kind: Deployment

metadata:
  name: client-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: client

  template:
    metadata:
      labels:
        component: client

    spec:
      containers:
        - name: client
          image: akashhulke/client:2efa79e8aa8cbb1bb1c139aa738be9c78c910d54
          ports:
            - containerPort: 3000
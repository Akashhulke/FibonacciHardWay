apiVersion: apps/v1
kind: Deployment

metadata:
  name: client-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      component: client

  template:
    metadata:
      labels:
        component: client

    spec:
      containers:
        - name: client
          image: akashhulke/client:c2a1b99d256586e629b5a48b37028802f3571e49
          ports:
            - containerPort: 3000
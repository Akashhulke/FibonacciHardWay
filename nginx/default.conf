upstream client {
    server client-service:80;
}

upstream api {
    server server-service:5000;
}

server {
    listen 80;

    location / {
        proxy_pass http://client;
    }

    location /api/ {
        proxy_pass http://api;
    }

    location /ws {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'k8s/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout code
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Docker Login
      # -----------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -----------------------------
      # Verify Dockerfiles
      # -----------------------------
      - name: Verify Dockerfiles
        working-directory: ./FibonacciHardWay
        run: |
          ls -la client
          ls -la server
          ls -la worker || echo "worker folder not present"
          ls -la nginx

      - name: Debug directory
        working-directory: ./FibonacciHardWay/client
        run: |
          pwd
          ls -la

      # -----------------------------
      # Build Docker Images
      # -----------------------------
      - name: Build Client Image
        working-directory: client
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }} -f Dockerfile .

      - name: Build Server Image
        working-directory: server
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }} -f Dockerfile .

      - name: Build Worker Image
        working-directory: worker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }} -f Dockerfile .

      - name: Build Nginx Image
        working-directory: nginx
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }} -f Dockerfile .

      # -----------------------------
      # Push Docker Images
      # -----------------------------
      - name: Push Client Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}

      - name: Push Server Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}

      - name: Push Worker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

      - name: Push Nginx Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}

      # -----------------------------
      # Update Kubernetes YAMLs
      # -----------------------------
      - name: Update Client Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*client.*|image: ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}|' k8s/client-deployment.yaml

      - name: Update Server Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*server.*|image: ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}|' k8s/server-deployment.yaml

      - name: Update Worker Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*worker.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}|' k8s/worker-deployment.yaml

      - name: Update Nginx Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*nginx.*|image: ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}|' k8s/nginx-deployment.yaml

      # -----------------------------
      # Commit Updated Kubernetes YAMLs
      # -----------------------------
      - name: Commit Updated Deployment Files
        working-directory: ./FibonacciHardWay
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
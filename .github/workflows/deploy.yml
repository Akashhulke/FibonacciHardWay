name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master

    paths-ignore:
      - 'k8s/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Docker Login
      # -----------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Verify Dockerfiles
        run: |
          ls -la FibonacciHardWay/client
          ls -la FibonacciHardWay/server
          ls -la FibonacciHardWay/worker
          ls -la FibonacciHardWay/nginx
      # -----------------------------
      # Build Images
      # -----------------------------
      - name: Build Client Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }} -f FibonacciHardWay/client/Dockerfile FibonacciHardWay/client

      - name: Build Server Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }} -f FibonacciHardWay/server/Dockerfile FibonacciHardWay/server

      - name: Build Worker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }} -f FibonacciHardWay/worker/Dockerfile FibonacciHardWay/worker

      - name: Build Nginx Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }} -f FibonacciHardWay/nginx/Dockerfile FibonacciHardWay/nginx

      # -----------------------------
      # Push Images
      # -----------------------------
      - name: Push Client Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}

      - name: Push Server Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}

      - name: Push Worker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

      - name: Push Nginx Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}

      # -----------------------------
      # Update Kubernetes YAML Files
      # -----------------------------
      - name: Update Client Deployment
        run: |
          sed -i 's|image:.*client.*|image: ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}|' FibonacciHardWay/k8s/client-deployment.yaml

      - name: Update Server Deployment
        run: |
          sed -i 's|image:.*server.*|image: ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}|' FibonacciHardWay/k8s/server-deployment.yaml

      - name: Update Worker Deployment
        run: |
          sed -i 's|image:.*worker.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}|' FibonacciHardWay/k8s/worker-deployment.yaml

      - name: Update Nginx Deployment
        run: |
          sed -i 's|image:.*nginx.*|image: ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}|' FibonacciHardWay/k8s/nginx-deployment.yaml

      # -----------------------------
      # Commit Updated YAMLs
      # -----------------------------
      - name: Commit Updated Deployment Files
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add FibonacciHardWay/k8s/

          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"

          git push origin HEAD:${{ github.ref_name }}
name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master

    paths-ignore:
      - 'k8s/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: ./FibonacciHardWay

      # -----------------------------
      # Docker Login
      # -----------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Verify Dockerfiles
        working-directory: ./FibonacciHardWay
        run: |
          ls -la client
          ls -la server
          ls -la worker
          ls -la nginx
      # -----------------------------
      # Build Images
      # -----------------------------
      - name: Build Client Image
        working-directory: ./FibonacciHardWay
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }} -f client/Dockerfile .

      - name: Build Server Image
        working-directory: ./FibonacciHardWay
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }} -f server/Dockerfile .

      - name: Build Worker Image
        working-directory: ./FibonacciHardWay
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }} -f worker/Dockerfile .

      - name: Build Nginx Image
        working-directory: ./FibonacciHardWay
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }} -f nginx/Dockerfile .

      # -----------------------------
      # Push Images
      # -----------------------------
      - name: Push Client Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}

      - name: Push Server Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}

      - name: Push Worker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

      - name: Push Nginx Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}

      # -----------------------------
      # Update Kubernetes YAML Files
      # -----------------------------
      - name: Update Client Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*client.*|image: ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}|' k8s/client-deployment.yaml

      - name: Update Server Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*server.*|image: ${{ secrets.DOCKER_USERNAME }}/server:${{ github.sha }}|' k8s/server-deployment.yaml

      - name: Update Worker Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*worker.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}|' k8s/worker-deployment.yaml

      - name: Update Nginx Deployment
        working-directory: ./FibonacciHardWay
        run: |
          sed -i 's|image:.*nginx.*|image: ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}|' k8s/nginx-deployment.yaml

      # -----------------------------
      # Commit Updated YAMLs
      # -----------------------------
      - name: Commit Updated Deployment Files
        working-directory: ./FibonacciHardWay
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add k8s/

          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"

          git push origin HEAD:${{ github.ref_name }}
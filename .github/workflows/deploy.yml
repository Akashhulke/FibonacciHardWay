name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'k8s/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout code
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug client folder
        run: ls -la ./client
      
      # -----------------------------
      # Debug repo structure
      # -----------------------------
      - name: List repo root
        run: ls -la

      # -----------------------------
      # Docker Login
      # -----------------------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # -----------------------------
      # Verify Dockerfiles exist
      # -----------------------------
      - name: Verify Dockerfiles
        run: |
          ls -la ./client
          ls -la ./server
          ls -la ./worker || echo "worker folder not present"
          ls -la ./nginx

      # -----------------------------
      # Build Docker Images
      # -----------------------------
      - name: Build Client Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }} -f ./client/Dockerfile ./client

      - name: Build Server Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/api:${{ github.sha }} -f ./server/Dockerfile ./server

      - name: Build Worker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }} -f ./worker/Dockerfile ./worker

      - name: Build Nginx Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }} -f ./nginx/Dockerfile ./nginx

      # -----------------------------
      # Push Docker Images
      # -----------------------------
      - name: Push Client Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}

      - name: Push Server Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/api:${{ github.sha }}

      - name: Push Worker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}

      - name: Push Nginx Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}

      # -----------------------------
      # Update Kubernetes YAMLs
      # -----------------------------
      - name: Update Client Deployment
        run: |
          sed -i 's|image:.*client.*|image: ${{ secrets.DOCKER_USERNAME }}/client:${{ github.sha }}|' k8s/client-deployment.yaml

      - name: Update Server Deployment
        run: |
          sed -i 's|image:.*api.*|image: ${{ secrets.DOCKER_USERNAME }}/api:${{ github.sha }}|' k8s/api-deployment.yaml

      - name: Update Worker Deployment
        run: |
          sed -i 's|image:.*worker.*|image: ${{ secrets.DOCKER_USERNAME }}/worker:${{ github.sha }}|' k8s/worker-deployment.yaml

      - name: Update Nginx Deployment
        run: |
          sed -i 's|image:.*nginx.*|image: ${{ secrets.DOCKER_USERNAME }}/nginx:${{ github.sha }}|' k8s/nginx-deployment.yaml

      # -----------------------------
      # Commit Updated Kubernetes YAMLs
      # -----------------------------
      - name: Commit Updated Deployment Files
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add k8s/
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}